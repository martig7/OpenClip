<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 4: "Film Strip Ring" — the ring IS a film strip with frame windows + sprocket holes -->
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="filmColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="ringMask4">
      <circle cx="256" cy="256" r="200" fill="white"/>
      <circle cx="256" cy="256" r="148" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg4)"/>

  <!-- Film strip band (ring shape via mask) -->
  <circle cx="256" cy="256" r="200" fill="#1e3a8a" mask="url(#ringMask4)"/>

  <!-- Film frame windows (lighter rectangles in the band) — 8 around the ring -->
  <g mask="url(#ringMask4)" opacity="0.55">
    <rect x="210" y="62"  width="92" height="60" rx="6" fill="#3b82f6"/>
    <rect x="210" y="390" width="92" height="60" rx="6" fill="#3b82f6"/>
    <rect x="62"  y="210" width="60" height="92" rx="6" fill="#3b82f6"/>
    <rect x="390" y="210" width="60" height="92" rx="6" fill="#3b82f6"/>
    <!-- Diagonal frames -->
    <rect x="338" y="86"  width="80" height="52" rx="6" fill="#2563eb" transform="rotate(45 378 112)"/>
    <rect x="86"  y="86"  width="80" height="52" rx="6" fill="#2563eb" transform="rotate(-45 134 112)"/>
    <rect x="338" y="374" width="80" height="52" rx="6" fill="#2563eb" transform="rotate(-45 378 400)"/>
    <rect x="86"  y="374" width="80" height="52" rx="6" fill="#2563eb" transform="rotate(45 134 400)"/>
  </g>

  <!-- Sprocket holes (small dark ovals on inner and outer edges of the film band) -->
  <!-- Outer edge sprockets -->
  <g opacity="0.9">
    <circle cx="256" cy="64"  r="8" fill="#030712"/>
    <circle cx="256" cy="448" r="8" fill="#030712"/>
    <circle cx="64"  cy="256" r="8" fill="#030712"/>
    <circle cx="448" cy="256" r="8" fill="#030712"/>
    <!-- Diagonal -->
    <circle cx="397" cy="115" r="7" fill="#030712"/>
    <circle cx="115" cy="115" r="7" fill="#030712"/>
    <circle cx="397" cy="397" r="7" fill="#030712"/>
    <circle cx="115" cy="397" r="7" fill="#030712"/>
  </g>
  <!-- Inner edge sprockets -->
  <g opacity="0.7">
    <circle cx="256" cy="160" r="6" fill="#030712"/>
    <circle cx="256" cy="352" r="6" fill="#030712"/>
    <circle cx="160" cy="256" r="6" fill="#030712"/>
    <circle cx="352" cy="256" r="6" fill="#030712"/>
    <!-- Diagonal -->
    <circle cx="346" cy="166" r="5" fill="#030712"/>
    <circle cx="166" cy="166" r="5" fill="#030712"/>
    <circle cx="346" cy="346" r="5" fill="#030712"/>
    <circle cx="166" cy="346" r="5" fill="#030712"/>
  </g>

  <!-- Film band border rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#3b82f6" stroke-width="3"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="148" x2="256" y2="174" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="338" x2="256" y2="364" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <line x1="148" y1="256" x2="174" y2="256" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <line x1="338" y1="256" x2="364" y2="256" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>

  <!-- Center fill -->
  <circle cx="256" cy="256" r="130" fill="#030712"/>

  <!-- Play triangle (gradient) -->
  <polygon points="216,196 216,316 332,256" fill="url(#playGrad)" filter="url(#glow4)"/>
</svg>
