<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 3: "Neon Reel" — segmented dashed ring, bright neon glow, layered rings -->
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <radialGradient id="centerGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="neon3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>

  <!-- Ambient center glow -->
  <circle cx="256" cy="256" r="240" fill="url(#centerGlow3)"/>

  <!-- Outer decorative ring (dashed, neon cyan) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#38bdf8"
          stroke-width="3" stroke-dasharray="18 10"
          stroke-dashoffset="5" opacity="0.35" filter="url(#softGlow3)"/>

  <!-- Main segmented ring (dashed neon) -->
  <circle cx="256" cy="256" r="184" fill="none" stroke="#38bdf8"
          stroke-width="7" stroke-dasharray="28 16"
          stroke-linecap="round" filter="url(#neon3)"/>

  <!-- Sprocket squares (cardinal) -->
  <g filter="url(#neon3)">
    <rect x="232" y="60"  width="48" height="18" rx="5" fill="#38bdf8"/>
    <rect x="232" y="434" width="48" height="18" rx="5" fill="#38bdf8"/>
    <rect x="60"  y="232" width="18" height="48" rx="5" fill="#38bdf8"/>
    <rect x="434" y="232" width="18" height="48" rx="5" fill="#38bdf8"/>
  </g>

  <!-- Crosshair lines (short, precision) -->
  <line x1="256" y1="78"  x2="256" y2="134" stroke="#38bdf8" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="256" y1="378" x2="256" y2="434" stroke="#38bdf8" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="78"  y1="256" x2="134" y2="256" stroke="#38bdf8" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="378" y1="256" x2="434" y2="256" stroke="#38bdf8" stroke-width="3" opacity="0.6" stroke-linecap="round"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="#7c3aed"
          stroke-width="3" opacity="0.7" filter="url(#softGlow3)"/>

  <!-- Center fill -->
  <circle cx="256" cy="256" r="118" fill="#010409"/>

  <!-- Innermost ring detail -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>

  <!-- Play triangle (neon white) -->
  <polygon points="218,198 218,314 338,256" fill="white" filter="url(#neon3)" opacity="0.97"/>
</svg>
