<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1F45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#150E28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E87C1E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B2D8E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84B1E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="60,12 97,33 97,75 60,96 23,75 23,33"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="300" height="120" rx="12" fill="url(#bg3)"/>

  <!-- Outer glow ring (OBS-style) -->
  <circle cx="60" cy="54" r="42" fill="none" stroke="url(#ringGrad3)" stroke-width="4" opacity="0.85" filter="url(#glow3)"/>

  <!-- Second inner ring -->
  <circle cx="60" cy="54" r="33" fill="#1A1030" stroke="#5B2D8E" stroke-width="1.5" opacity="0.6"/>

  <!-- Record button - center circle OBS style -->
  <circle cx="60" cy="54" r="20" fill="#252040"/>
  <circle cx="60" cy="54" r="12" fill="url(#dotGrad3)" filter="url(#glow3)"/>
  <!-- REC indicator -->
  <circle cx="60" cy="54" r="5" fill="#ffffff" opacity="0.95"/>

  <!-- Clip notch cut into ring (top right) - suggests a "clip" metaphor -->
  <path d="M 88 25 L 97 22 L 94 33" fill="none" stroke="#E87C1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Small film perforations around circle -->
  <rect x="17" y="38" width="5" height="9" rx="1.5" fill="#7B5EA7" opacity="0.7"/>
  <rect x="17" y="52" width="5" height="9" rx="1.5" fill="#7B5EA7" opacity="0.7"/>
  <rect x="96" y="38" width="5" height="9" rx="1.5" fill="#7B5EA7" opacity="0.7"/>
  <rect x="96" y="52" width="5" height="9" rx="1.5" fill="#7B5EA7" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="118" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="300" fill="#D0C0F0" letter-spacing="5">OPEN</text>
  <text x="116" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#E87C1E" letter-spacing="2">CLIP</text>

  <!-- Thin accent line -->
  <line x1="118" y1="79" x2="290" y2="79" stroke="#E87C1E" stroke-width="1" opacity="0.35"/>

  <!-- Version / subtitle -->
  <text x="118" y="93" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#7B6A9A" letter-spacing="2">POWERED BY OBS STUDIO</text>
</svg>
