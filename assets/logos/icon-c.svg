<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Open arc + play button — near-black bg, orange arc, white play -->
  <rect width="100" height="100" rx="20" fill="#18181b"/>

  <!-- C-arc: 270° opening to the right, r=33, centered at 50,50 -->
  <!-- Start: top-right (73.3, 26.7) → counterclockwise large arc → bottom-right (73.3, 73.3) -->
  <path d="M 73.3 26.7 A 33 33 0 1 0 73.3 73.3"
        fill="none" stroke="#f97316" stroke-width="9" stroke-linecap="round"/>

  <!-- Play triangle -->
  <polygon points="41,36 41,64 67,50" fill="white"/>
</svg>
