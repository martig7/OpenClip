<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clapperboard icon — dark bg, white body, red arm -->
  <rect width="100" height="100" rx="20" fill="#111827"/>

  <!-- Clapper body -->
  <rect x="15" y="43" width="70" height="44" rx="5" fill="#f1f5f9"/>
  <!-- Body horizontal rules -->
  <line x1="15" y1="58" x2="85" y2="58" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="15" y1="71" x2="85" y2="71" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Record button in body -->
  <circle cx="50" cy="64" r="11" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="50" cy="64" r="6" fill="#ef4444"/>

  <!-- Clapper arm -->
  <rect x="15" y="29" width="70" height="16" rx="4" fill="#dc2626"/>
  <!-- Dark diagonal stripes clipped to arm -->
  <clipPath id="ac">
    <rect x="15" y="29" width="70" height="16" rx="4"/>
  </clipPath>
  <g clip-path="url(#ac)" stroke="#111827" stroke-width="7" stroke-linecap="butt">
    <line x1="8"  y1="22" x2="26" y2="54"/>
    <line x1="20" y1="22" x2="38" y2="54"/>
    <line x1="32" y1="22" x2="50" y2="54"/>
    <line x1="44" y1="22" x2="62" y2="54"/>
    <line x1="56" y1="22" x2="74" y2="54"/>
    <line x1="68" y1="22" x2="86" y2="54"/>
    <line x1="80" y1="22" x2="98" y2="54"/>
  </g>

  <!-- Hinge pins -->
  <circle cx="32" cy="30" r="4" fill="#1e293b"/>
  <circle cx="68" cy="30" r="4" fill="#1e293b"/>
</svg>
