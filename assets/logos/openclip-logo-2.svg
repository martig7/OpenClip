<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E87C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C05000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E87C1E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="120" rx="12" fill="url(#bg2)"/>

  <!-- Hexagon icon shape -->
  <polygon points="60,16 93,35 93,73 60,92 27,73 27,35" fill="#252540" stroke="#7B5EA7" stroke-width="2"/>

  <!-- Clip / film strip icon inside hex -->
  <!-- Film strip body -->
  <rect x="38" y="38" width="44" height="32" rx="3" fill="none" stroke="#7B5EA7" stroke-width="2"/>
  <!-- Left teeth -->
  <rect x="35" y="42" width="5" height="7" rx="1" fill="#7B5EA7"/>
  <rect x="35" y="54" width="5" height="7" rx="1" fill="#7B5EA7"/>
  <!-- Right teeth -->
  <rect x="78" y="42" width="5" height="7" rx="1" fill="#7B5EA7"/>
  <rect x="78" y="54" width="5" height="7" rx="1" fill="#7B5EA7"/>
  <!-- Play triangle (record/play) -->
  <polygon points="52,47 52,61 67,54" fill="url(#iconGrad2)" filter="url(#shadow2)"/>

  <!-- Text block -->
  <!-- "OC" monogram hint via colored letters -->
  <text x="112" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-1">
    <tspan fill="#E87C1E">O</tspan>pen<tspan fill="#E87C1E">C</tspan>lip
  </text>

  <!-- Divider line -->
  <line x1="112" y1="67" x2="288" y2="67" stroke="#7B5EA7" stroke-width="0.75" opacity="0.5"/>

  <!-- Tagline -->
  <text x="113" y="83" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#9080B0" letter-spacing="3.5" font-weight="400">OBS GAME RECORDER</text>
</svg>
