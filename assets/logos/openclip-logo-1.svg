<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="obsGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#302459;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1230;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B5EA7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B3080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="120" rx="12" fill="url(#obsGrad1)"/>

  <!-- OBS-style outer ring -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="#7B5EA7" stroke-width="3" opacity="0.5"/>
  <circle cx="60" cy="60" r="38" fill="url(#circleGrad1)"/>

  <!-- Record dot (OBS orange) -->
  <circle cx="60" cy="60" r="14" fill="#E87C1E" filter="url(#glow1)"/>
  <!-- Inner white dot -->
  <circle cx="60" cy="60" r="6" fill="#ffffff" opacity="0.9"/>

  <!-- Film clip teeth - top -->
  <rect x="24" y="20" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="36" y="20" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="76" y="20" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="88" y="20" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>

  <!-- Film clip teeth - bottom -->
  <rect x="24" y="94" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="36" y="94" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="76" y="94" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>
  <rect x="88" y="94" width="8" height="6" rx="1" fill="#B09FD0" opacity="0.6"/>

  <!-- Text: OpenClip -->
  <text x="118" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="1">Open</text>
  <text x="118" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#E87C1E" letter-spacing="1">Clip</text>

  <!-- Tagline -->
  <text x="118" y="98" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#9080B0" letter-spacing="2">AUTO GAME RECORDER</text>
</svg>
