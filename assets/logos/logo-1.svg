<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: "Scope" — full crosshair lines, tick marks, double ring, play center -->
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>

  <!-- Subtle glow behind center -->
  <circle cx="256" cy="256" r="180" fill="url(#glow1)"/>

  <!-- Full crosshair lines -->
  <line x1="256" y1="48" x2="256" y2="160" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="352" x2="256" y2="464" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="48"  y1="256" x2="160" y2="256" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="352" y1="256" x2="464" y2="256" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Crosshair tick marks (minor) -->
  <line x1="256" y1="64"  x2="256" y2="80"  stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="432" x2="256" y2="448" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="64"  y1="256" x2="80"  y2="256" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="432" y1="256" x2="448" y2="256" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Diagonal minor ticks -->
  <line x1="178" y1="120" x2="186" y2="128" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="326" y1="120" x2="334" y2="128" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="178" y1="392" x2="186" y2="384" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="326" y1="392" x2="334" y2="384" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="url(#ring1)" stroke-width="6"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>

  <!-- Sprocket squares at cardinal positions (on outer ring) -->
  <rect x="230" y="72"  width="52" height="16" rx="4" fill="#38bdf8"/>
  <rect x="230" y="424" width="52" height="16" rx="4" fill="#38bdf8"/>
  <rect x="72"  y="230" width="16" height="52" rx="4" fill="#38bdf8"/>
  <rect x="424" y="230" width="16" height="52" rx="4" fill="#38bdf8"/>

  <!-- Inner dark fill -->
  <circle cx="256" cy="256" r="120" fill="#060e1a"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.6"/>

  <!-- Play triangle -->
  <polygon points="218,200 218,312 326,256" fill="white"/>
</svg>
