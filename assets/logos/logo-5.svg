<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 5: "Command" — hex frame, circuit traces, tri-color accent, bold play -->
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#050d14"/>
    </radialGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="playGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle5">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg5)"/>

  <!-- Outer circle (thin) -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.2"/>

  <!-- Main hex ring -->
  <polygon
    points="256,56 440,158 440,354 256,456 72,354 72,158"
    fill="none" stroke="url(#hexStroke)" stroke-width="6" stroke-linejoin="round"
    filter="url(#subtle5)"/>

  <!-- Hex corner accent dots -->
  <circle cx="256" cy="56"  r="8" fill="#f59e0b" filter="url(#subtle5)"/>
  <circle cx="440" cy="158" r="8" fill="#38bdf8" filter="url(#subtle5)"/>
  <circle cx="440" cy="354" r="8" fill="#38bdf8" filter="url(#subtle5)"/>
  <circle cx="256" cy="456" r="8" fill="#f59e0b" filter="url(#subtle5)"/>
  <circle cx="72"  cy="354" r="8" fill="#38bdf8" filter="url(#subtle5)"/>
  <circle cx="72"  cy="158" r="8" fill="#38bdf8" filter="url(#subtle5)"/>

  <!-- Circuit traces from hex corners inward -->
  <g stroke="#38bdf8" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <polyline points="256,56 256,110"/>
    <polyline points="440,158 396,185"/>
    <polyline points="440,354 396,327"/>
    <polyline points="256,456 256,402"/>
    <polyline points="72,354 116,327"/>
    <polyline points="72,158 116,185"/>
  </g>
  <!-- Trace end nodes -->
  <g fill="#38bdf8" opacity="0.5">
    <circle cx="256" cy="110" r="4"/>
    <circle cx="396" cy="185" r="4"/>
    <circle cx="396" cy="327" r="4"/>
    <circle cx="256" cy="402" r="4"/>
    <circle cx="116" cy="327" r="4"/>
    <circle cx="116" cy="185" r="4"/>
  </g>

  <!-- Sprocket-style squares on hex flat sides -->
  <g fill="#f59e0b" opacity="0.8">
    <!-- Top flat (between top-left and top-right) — horizontal center -->
    <rect x="238" y="52"  width="36" height="14" rx="4" fill="#f59e0b"/>
    <rect x="238" y="446" width="36" height="14" rx="4" fill="#f59e0b"/>
  </g>

  <!-- Inner round ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#38bdf8" stroke-width="4" filter="url(#subtle5)"/>
  <circle cx="256" cy="256" r="144" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="96"  x2="256" y2="160" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="256" y1="352" x2="256" y2="416" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="96"  y1="256" x2="160" y2="256" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="352" y1="256" x2="416" y2="256" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>

  <!-- Center fill -->
  <circle cx="256" cy="256" r="120" fill="#050d14"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#38bdf8" stroke-width="2.5"/>

  <!-- Play triangle -->
  <polygon points="216,196 216,316 334,256" fill="url(#playGrad5)" filter="url(#glow5)"/>
</svg>
